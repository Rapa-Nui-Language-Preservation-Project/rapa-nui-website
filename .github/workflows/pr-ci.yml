name: PR CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PUBLIC_POCKETBASE_URL: http://localhost:8090/api
      POCKETBASE_URL: http://localhost:8090

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint and format
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build
          if-no-files-found: ignore

      # Dead exports check
      # - name: Dead exports
      #   run: npx ts-prune --error
